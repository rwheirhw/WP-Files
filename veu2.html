<!DOCTYPE html>
<html>
<head>
  <title>Student Task Manager</title>

  <!-- Vue CDN -->
  <script src="https://unpkg.com/vue@3"></script>

  <!-- Bootstrap for Professional UI -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div id="app" class="container mt-5">
  
  <!-- Header -->
  <div class="card shadow p-4">
    <h2 class="text-center text-primary">📘 Student Task</h2>
    <p class="text-center text-muted">Manage your academic tasks efficiently</p>

    <!-- Input Section -->
    <div class="input-group mb-3">
      <input type="text" class="form-control" placeholder="Enter new task" v-model="newTask">
      <button class="btn btn-primary" @click="addTask">Add</button>
    </div>

    <!-- Task List -->
    <ul class="list-group">
      <li 
        class="list-group-item d-flex justify-content-between align-items-center"
        v-for="(task, index) in tasks"
      >
        <div>
          <input type="checkbox" v-model="task.completed">
          <span :class="{ 'text-decoration-line-through': task.completed }">
            {{ task.name }}
          </span>
        </div>

        <button class="btn btn-danger btn-sm" @click="removeTask(index)">
          Delete
        </button>
      </li>
    </ul>

    <!-- Summary -->
    <div class="mt-3 text-center">
      <p>Total Tasks: {{ tasks.length }}</p>
      <p>Completed: {{ completedTasks }}</p>
    </div>

  </div>

</div>

<script>
const app = Vue.createApp({
  data() {
    return {
      newTask: '',
      tasks: [
        { name: "Complete Vue Assignment", completed: false },
        { name: "Prepare Lab Record", completed: false }
      ]
    }
  },
  computed: {
    completedTasks() {
      return this.tasks.filter(task => task.completed).length;
    }
  },
  methods: {
    addTask() {
      if (this.newTask.trim() !== '') {
        this.tasks.push({
          name: this.newTask,
          completed: false
        });
        this.newTask = '';
      }
    },
    removeTask(index) {
      this.tasks.splice(index, 1);
    }
  }
});

app.mount('#app');
</script>

</body>
</html>
