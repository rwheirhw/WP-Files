<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoPlaaten</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero text-center py-5">
    <div class="container">
      <h1>Find inspiration for your next creation</h1>
      <p>Minimal visual references for posters, UI, thumbnails, and edits.</p>
      <button class="btn btn-light mt-3">Explore Gallery</button>
    </div>
  </section>

  <section class="filters py-4">
    <div class="container d-flex flex-wrap gap-2 justify-content-center">
      <button class="btn btn-dark filter-btn" data-category="All">All</button>
      <button class="btn btn-outline-light filter-btn" data-category="Mood">Mood</button>
      <button class="btn btn-outline-light filter-btn" data-category="UI">UI</button>
      <button class="btn btn-outline-light filter-btn" data-category="Posters">Posters</button>
    </div>
  </section>

  <section class="gallery-section"><div class="container"><div id="gallery" class="gallery"></div></div></section>
  <footer class="text-center py-4">PhotoPlaaten</footer>
  <script src="script.js"></script>
</body>
</html>
